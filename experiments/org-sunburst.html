<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Org Chart · Radial Sunburst</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fafaf7; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  #wrap { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  aside { background: white; border-right: 1px solid #e5e7eb; padding: 20px; overflow-y: auto; }
  aside h1 { margin: 0 0 4px; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  aside .sub { margin: 0 0 16px; font-size: 11px; color: #6b7280; line-height: 1.55; }
  aside label { display: block; font-size: 11px; color: #6b7280; margin: 12px 0 6px; }
  aside input[type=file] { font-size: 11px; }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; color: #374151; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .selected {
    margin-top: 18px; padding: 12px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb;
    font-size: 12px;
  }
  .selected b { display: block; font-size: 13px; color: #111827; margin-bottom: 4px; }
  .selected .meta { color: #6b7280; line-height: 1.5; }
  main { position: relative; }
  svg { display: block; width: 100%; height: 100%; }
  .arc { cursor: pointer; transition: opacity 0.15s; stroke: white; stroke-width: 1.5; }
  .arc:hover { opacity: 0.85; }
  .arc.dim { opacity: 0.18; }
  .label { font-size: 9px; fill: white; font-weight: 600; pointer-events: none; user-select: none; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .center-label { text-anchor: middle; font-size: 13px; font-weight: 700; fill: #1e293b; pointer-events: none; }
  .center-sub { text-anchor: middle; font-size: 10px; fill: #6b7280; pointer-events: none; }
  .stats { font-size: 11px; color: #6b7280; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
  .stat { display: flex; justify-content: space-between; padding: 3px 0; }
  .stat span:last-child { font-weight: 600; color: #111827; }
</style>
</head>
<body>

<div id="wrap">
  <aside>
    <h1>Radial Sunburst</h1>
    <p class="sub">CEO at center; rings outward = reporting depth. Wedge size = subtree headcount. Click a wedge to zoom into that branch; click center to zoom out.</p>

    <label>Load real data (CSV from main app):</label>
    <input type="file" id="csv-input" accept=".csv" />

    <div id="legend" style="margin-top:14px"></div>

    <div class="selected" id="selected" style="display:none">
      <b id="sel-name"></b>
      <div class="meta" id="sel-meta"></div>
    </div>

    <div class="stats" id="stats"></div>
  </aside>
  <main>
    <svg id="svg"></svg>
  </main>
</div>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="_shared.js"></script>

<script>
const { SAMPLE, DEPT_COLORS, deptColor, buildTree, attachCSVLoader } = window.OrgShared;

const svg = d3.select("#svg");
const elLegend = document.getElementById("legend");
const elStats  = document.getElementById("stats");
const elSel    = document.getElementById("selected");
const elSelName = document.getElementById("sel-name");
const elSelMeta = document.getElementById("sel-meta");

elLegend.innerHTML = Object.entries(DEPT_COLORS).map(([d, c]) =>
  `<div class="legend-row"><div class="legend-dot" style="background:${c}"></div>${d}</div>`
).join("");

function render(employees) {
  const { roots, byId, childrenOf } = buildTree(employees);

  // Build a hierarchy. If multiple roots, synthesize a virtual root.
  const rootData = roots.length === 1
    ? toHierarchy(roots[0], childrenOf)
    : { id: "__root", first: "Org", last: "", title: "Organization", dept: "Exec", level: "", location: "", children: roots.map(r => toHierarchy(r, childrenOf)) };

  const root = d3.hierarchy(rootData)
    .sum(d => (d.children && d.children.length) ? 0 : 1)  // leaf weight = 1 person
    .sort((a, b) => b.value - a.value);

  // Sunburst layout
  const w = svg.node().clientWidth;
  const h = svg.node().clientHeight;
  const radius = Math.min(w, h) / 2 - 24;
  d3.partition().size([2 * Math.PI, radius])(root);

  const arc = d3.arc()
    .startAngle(d => d.x0)
    .endAngle(d => d.x1)
    .innerRadius(d => d.y0)
    .outerRadius(d => d.y1 - 1)
    .padAngle(0.005)
    .padRadius(radius / 2);

  svg.selectAll("*").remove();
  const g = svg.append("g").attr("transform", `translate(${w/2}, ${h/2})`);

  let focus = root;

  const path = g.selectAll("path")
    .data(root.descendants().filter(d => d.depth > 0))
    .join("path")
    .attr("class", "arc")
    .attr("fill", d => deptColor(d.data.dept))
    .attr("d", arc)
    .on("click", (_, d) => clicked(d))
    .on("mouseover", (_, d) => showInfo(d.data))
    .on("mouseout", () => elSel.style.display = "none");

  // Labels — only on wedges big enough to fit text
  g.selectAll("text.label")
    .data(root.descendants().filter(d => d.depth > 0 && (d.x1 - d.x0) > 0.07 && (d.y1 - d.y0) > 14))
    .join("text")
    .attr("class", "label")
    .attr("transform", d => {
      const angle = (d.x0 + d.x1) / 2;
      const r = (d.y0 + d.y1) / 2;
      const deg = (angle * 180 / Math.PI - 90);
      const flip = deg > 90 ? 180 : 0;
      return `rotate(${deg}) translate(${r},0) rotate(${flip})`;
    })
    .attr("text-anchor", "middle")
    .attr("dy", "0.35em")
    .text(d => {
      const name = d.data.first || "";
      const last = d.data.last || "";
      const max = Math.floor((d.y1 - d.y0) / 5);
      return (name + " " + last).slice(0, max);
    });

  // Center label (current focus)
  const centerLabel = g.append("text").attr("class", "center-label").attr("dy", "-0.2em");
  const centerSub   = g.append("text").attr("class", "center-sub").attr("dy", "1em");

  function clicked(d) {
    focus = (d === focus) ? root : d;
    showInfo(focus.data, true);
    // Re-layout from focus
    root.each(node => {
      node.target = {
        x0: Math.max(0, Math.min(1, (node.x0 - focus.x0) / (focus.x1 - focus.x0))) * 2 * Math.PI,
        x1: Math.max(0, Math.min(1, (node.x1 - focus.x0) / (focus.x1 - focus.x0))) * 2 * Math.PI,
        y0: Math.max(0, node.y0 - focus.y0),
        y1: Math.max(0, node.y1 - focus.y0),
      };
    });
    path.transition().duration(700)
      .tween("data", d => {
        const i = d3.interpolate({ x0: d.x0, x1: d.x1, y0: d.y0, y1: d.y1 }, d.target);
        return t => Object.assign(d, i(t));
      })
      .attrTween("d", d => () => arc(d));
    g.selectAll("text.label").transition().duration(700)
      .attrTween("transform", d => {
        const i = d3.interpolate({ x0: d.x0, x1: d.x1, y0: d.y0, y1: d.y1 }, d.target);
        return t => {
          const v = i(t);
          const angle = (v.x0 + v.x1) / 2;
          const r = (v.y0 + v.y1) / 2;
          const deg = (angle * 180 / Math.PI - 90);
          const flip = deg > 90 ? 180 : 0;
          return `rotate(${deg}) translate(${r},0) rotate(${flip})`;
        };
      })
      .style("opacity", d => {
        const t = d.target;
        return ((t.x1 - t.x0) > 0.07 && (t.y1 - t.y0) > 14) ? 1 : 0;
      });
  }

  function showInfo(data, persist = false) {
    if (data.id === "__root") {
      centerLabel.text("Organization");
      centerSub.text(`${employees.length} people`);
      if (persist) { elSel.style.display = "none"; }
      return;
    }
    elSel.style.display = "block";
    elSelName.textContent = `${data.first} ${data.last}`;
    elSelMeta.innerHTML = `${data.title}<br><span style="color:#9ca3af">${data.dept} · ${data.location}</span>`;
    centerLabel.text(`${data.first} ${data.last}`);
    centerSub.text(data.title);
  }
  showInfo(root.data, true);

  // Stats
  const deptCounts = {};
  employees.forEach(e => deptCounts[e.dept] = (deptCounts[e.dept] || 0) + 1);
  let maxDepth = 0;
  root.each(d => { if (d.depth > maxDepth) maxDepth = d.depth; });
  elStats.innerHTML = `
    <div class="stat"><span>People</span><span>${employees.length}</span></div>
    <div class="stat"><span>Departments</span><span>${Object.keys(deptCounts).length}</span></div>
    <div class="stat"><span>Depth</span><span>${maxDepth} levels</span></div>
  `;
}

function toHierarchy(person, childrenOf) {
  const kids = childrenOf.get(person.id) || [];
  const node = { ...person };
  if (kids.length) node.children = kids.map(k => toHierarchy(k, childrenOf));
  return node;
}

let currentEmployees = SAMPLE;
render(currentEmployees);
attachCSVLoader(document.getElementById("csv-input"), emps => { currentEmployees = emps; render(emps); });
window.addEventListener("resize", () => render(currentEmployees));
</script>
</body>
</html>
